      description: Teaser bet leg details.
    TeaserLegBetStatus:
      enum:
        - ACCEPTED
        - CANCELLED
        - LOST
        - PUSHED
        - REFUNDED
        - REJECTED
        - WON
        - HALF_LOST_HALF_PUSHED
        - HALF_WON_HALF_PUSHED
        - PENDING_ACCEPTANCE
      type: string
      description: "ACCEPTED = The leg is accepted,  \nCANCELLED = The leg is canceled- the stake on this leg will be transferred to the next one. In this case the leg will be ignored when calculating the winLoss,  \nLOST = The leg is a loss or a push-lose. When Push-lose happens, the half of the stake on the leg will be pushed to the next leg, and the other half will be a lose. This can happen only when the leg is placed on a quarter points handicap,  \nPUSHED = The leg is a push - the stake on this leg will be transferred to the next one. In this case the leg will be ignored when calculating the winLoss,  \nREFUNDED = The leg is refunded - the stake on this leg will be transferred to the next one. In this case the leg will be ignored when calculating the winLoss,  \nREJECTED = The leg is rejected - the stake on this leg will be transferred to the next one. In this case the leg will be ignored when calculating the winLoss,  \nWON = The leg is a won or a push-won. When Push-won happens, the half of the stake on the leg will be pushed to the next leg, and the other half is won. This can happen only when the leg is placed on a quarter points handicap,  \nHALF_LOST_HALF_PUSHED = The leg is a push-lose. The half of the stake on the leg will be pushed to the next leg, and the other half will be a lose. This can happen only when the leg is placed on a quarter points handicap,  \nHALF_WON_HALF_PUSHED = The leg is a push-won. The half of the stake on the leg will be pushed to the next leg, and the other half is won. This can happen only when the leg is placed on a quarter points handicap"
    TeaserLegBetType:
      enum:
        - SPREAD
        - TOTAL_POINTS
      type: string
      description: "Teaser leg bet type.  \nSPREAD = Spread bet type,  \nTOTAL_POINTS = Total points bet type"
    WagerInfo:
