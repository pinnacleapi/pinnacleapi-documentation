          type: integer
          description: Reference to the teaser group id.
          format: int32
          nullable: true
      additionalProperties: false
      description: Teaser bet details.
    TeaserBetLeg:
      type: object
      properties:
        sportId:
          type: integer
          description: Sport identification.
          format: int32
        sportName:
          type: string
          description: Sport name.
          nullable: true
        legBetType:
          $ref: '#/components/schemas/TeaserLegBetType'
        legBetStatus:
          $ref: '#/components/schemas/TeaserLegBetStatus'
        leagueName:
          type: string
          description: League name.
          nullable: true
        leagueId:
          type: integer
          description: League identification.
          format: int32
        eventId:
          type: integer
          description: Event identification.
          format: int32
          nullable: true
        eventStartTime:
          type: string
          description: Date time when the event starts.
          format: date-time
          nullable: true
        handicap:
          type: number
          description: Handicap value.
          format: double
          nullable: true
        teamName:
          type: string
          description: Name of the team.
          nullable: true
        side:
          $ref: '#/components/schemas/SideType'
        team1:
