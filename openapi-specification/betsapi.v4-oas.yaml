        - TEASER_DOES_NOT_EXIST
        - SAME_EVENT_ONLY_REQUIRED
        - SYSTEM_ERROR_1
        - SYSTEM_ERROR_2
        - SYSTEM_ERROR_3
        - TOO_FEW_LEGS
        - TOO_MANY_LEGS
