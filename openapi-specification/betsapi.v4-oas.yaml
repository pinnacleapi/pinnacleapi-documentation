    PlaceStraightBetResponseErrorCodes:
      enum:
        - ALL_BETTING_CLOSED
        - ALL_LIVE_BETTING_CLOSED
        - ABOVE_EVENT_MAX
        - ABOVE_MAX_BET_AMOUNT
        - BELOW_MIN_BET_AMOUNT
        - BLOCKED_BETTING
        - BLOCKED_CLIENT
        - INSUFFICIENT_FUNDS
        - INVALID_COUNTRY
        - INVALID_EVENT
        - INVALID_ODDS_FORMAT
        - LINE_CHANGED
        - LISTED_PITCHERS_SELECTION_ERROR
        - OFFLINE_EVENT
        - PAST_CUTOFFTIME
        - RED_CARDS_CHANGED
        - SCORE_CHANGED
        - TIME_RESTRICTION
        - DUPLICATED_REQUEST
        - INCOMPLETE_CUSTOMER_BETTING_PROFILE
        - INVALID_CUSTOMER_PROFILE
        - LIMITS_CONFIGURATION_ISSUE
        - RESPONSIBLE_BETTING_LOSS_LIMIT_EXCEEDED
        - RESPONSIBLE_BETTING_RISK_LIMIT_EXCEEDED
        - SYSTEM_ERROR_3
        - LICENCE_RESTRICTION_LIVE_BETTING_BLOCKED
        - RESUBMIT_REQUEST
        - LIMIT_PRICE_IS_WORST_THAN_CURRENT
        - GAME_OFFLINE
        - BETTING_SUSPENDED
      type: string
      description: "ALL_BETTING_CLOSED = Betting is not allowed at this moment. This may happen during system maintenance,  \nALL_LIVE_BETTING_CLOSED = Live betting is not allowed at this moment. This may happen during system maintenance,  \nABOVE_EVENT_MAX = Bet cannot be placed because client exceeded allowed maximum of risk on a line,  \nABOVE_MAX_BET_AMOUNT = Stake is above allowed maximum amount,  \nBELOW_MIN_BET_AMOUNT = Stake is below allowed minimum amount,  \nBLOCKED_BETTING = Betting is suspended for the client,  \nBLOCKED_CLIENT = Client is no longer active,  \nINSUFFICIENT_FUNDS = Bet is submitted by a client with insufficient funds,  \nINVALID_COUNTRY = Client country is not allowed for betting,  \nINVALID_EVENT = Invalid eventid,  \nINVALID_ODDS_FORMAT = If a bet was submitted with the odds format that is not allowed for the client,  \nLINE_CHANGED = Bet is submitted on a line that has changed,  \nLISTED_PITCHERS_SELECTION_ERROR = If bet was submitted with pitcher1MustStart and/or pitcher2MustStart parameters with values that are not allowed,  \nOFFLINE_EVENT = Bet is submitted on an event that is offline or the submitted line is not offered at the moment due to points/handicap change or the submitted bet type is just not offered at the moment,  \nPAST_CUTOFFTIME = Bet is submitted on a game after the betting cutoff time,  \nRED_CARDS_CHANGED = Bet is submitted on a live soccer event with changed red card count,  \nSCORE_CHANGED = Bet is submitted on a live soccer event with changed score,  \nTIME_RESTRICTION = Bet is submitted within too short of a period from the same bet previously placed by a client,  \nDUPLICATED_REQUEST = Request with the same uniqueRequestId was already processed. Please set the new value if you still want the request to be processed,  \nINCOMPLETE_CUSTOMER_BETTING_PROFILE = System configuration issue,  \nINVALID_CUSTOMER_PROFILE = System configuration issue,  \nLIMITS_CONFIGURATION_ISSUE = System configuration issue,  \nRESPONSIBLE_BETTING_LOSS_LIMIT_EXCEEDED = Client has reached his total loss limit,  \nRESPONSIBLE_BETTING_RISK_LIMIT_EXCEEDED = Client has reached his total risk limit,  \nSYSTEM_ERROR_3 = Unexpected error,  \nLICENCE_RESTRICTION_LIVE_BETTING_BLOCKED = Live betting blocked due to licence restrictions,  \nRESUBMIT_REQUEST = Unable to process the request but the request itself is valid,  \nLIMIT_PRICE_IS_WORST_THAN_CURRENT = Limit price is worse than the current price,  \nGAME_OFFLINE = Game offline,  \nBETTING_SUSPENDED = Due to anomalous market circumstances bets are not currently being accepted on this line. Try again with next LineId"
    PlaceStraightBetResponseStatus:
      enum:
        - ACCEPTED
        - PENDING_ACCEPTANCE
        - PROCESSED_WITH_ERROR
      type: string
      description: "ACCEPTED = Bet was accepted,  \nPENDING_ACCEPTANCE = Bet is pending acceptance. This status is reserved for live bets with live delay applied,  \nPROCESSED_WITH_ERROR = Bet was not accepted. See errorCode for details"
    PlaceTeaserBetErrorCode:
      enum:
        - ABOVE_MAX_BET_AMOUNT
        - ALL_BETTING_CLOSED
        - BELOW_MIN_BET_AMOUNT
        - BLOCKED_BETTING
