openapi: 3.0.1
info:
  title: Bets API v4
  description: Bets API v4 to support B2B and Public requests
  version: v4
paths:
  /v4/bets:
    get:
      tags:
        - Public End-points
      operationId: Public_GetBets
      parameters:
        - name: betList
          in: query
          schema:
            $ref: '#/components/schemas/GetBetsBetList'
        - name: fromDate
          in: query
          schema:
            type: string
            format: date-time
        - name: toDate
          in: query
          schema:
            type: string
            format: date-time
        - name: sortDir
          in: query
          schema:
            $ref: '#/components/schemas/GetBetsSortDirection'
        - name: pageSize
          in: query
          schema:
            type: integer
            format: int32
        - name: fromRecord
          in: query
          schema:
            type: integer
            format: int32
        - name: provideTotal
          in: query
          schema:
            type: boolean
        - name: betids
          in: query
          schema:
            type: array
            items:
              type: integer
              format: int64
        - name: uniqueRequestIds
          in: query
          schema:
            type: array
            items:
              type: string
              format: uuid
        - name: betType
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/GetBetsBetType'
        - name: betStatuses
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/GetBetsBetStatus'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetBetsResponse'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/HttpValidationProblemDetails'
  /v4/bets/straight:
    post:
      tags:
        - Public End-points
      operationId: Public_PlaceStraightBet
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceStraightBetRequest'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceStraightBetResponse'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/HttpValidationProblemDetails'
  /v4/bets/parlay:
    post:
      tags:
        - Public End-points
      operationId: Public_PlaceParlayBet
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceParlayBetRequest'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceParlayBetResponse'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/HttpValidationProblemDetails'
  /v4/bets/teaser:
    post:
      tags:
        - Public End-points
      operationId: Public_PlaceTeaserBet
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceTeaserBetRequest'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceTeaserBetResponse'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/HttpValidationProblemDetails'
  /v4/bets/special:
    post:
      tags:
        - Public End-points
      operationId: Public_PlaceContestBets
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceSpecialBetsRequest'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceSpecialBetsResponse'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/HttpValidationProblemDetails'
  /v4/bets/betting-status:
    get:
      tags:
        - Public End-points
      operationId: Public_GetBettingStatus
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetBettingStatusResponse'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/HttpValidationProblemDetails'
components:
  schemas:
    B2BCancelBetErrorCode:
      enum:
        - BET_DOESNOT_EXIST
        - BET_HAS_BEEN_CANCELLED_ALREADY
        - PARTNER_BET_ID_MISMATCH
        - BET_CANCELLING_IS_NOT_ALLOWED
      type: string
      description: "BET_DOESNOT_EXIST = Bet does not exist,  \nBET_HAS_BEEN_CANCELLED_ALREADY = Bet has been cancelled already,  \nPARTNER_BET_ID_MISMATCH = Partner bet ID mismatch,  \nBET_CANCELLING_IS_NOT_ALLOWED = Bet cancelling is not allowed"
    B2BCancelBetRequest:
      type: object
      properties:
        betId:
          type: integer
          format: int64
        wagerNumber:
          type: integer
          format: int32
        itemNumber:
          type: integer
          format: int32
          nullable: true
        gradingReasonId:
          type: integer
          format: int32
          nullable: true
        cancellationCode:
          type: string
          nullable: true
        username:
          type: string
          nullable: true
        appId:
          type: string
          nullable: true
        correlationId:
          type: string
          format: uuid
          nullable: true
        requestId:
          type: string
          format: uuid
          nullable: true
      additionalProperties: false
    B2BCancelBetResponse:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/B2BCancelBetStatus'
        errorCode:
          $ref: '#/components/schemas/B2BCancelBetErrorCode'
      additionalProperties: false
      description: Response for the B2B cancel bet operation.
    B2BCancelBetStatus:
      enum:
        - CANCELLED
        - PROCESSED_WITH_ERROR
      type: string
      description: "CANCELLED = Bet was cancelled successfully,  \nPROCESSED_WITH_ERROR = Bet could not be cancelled. See errorCode for details"
    B2BGetBetsResponse:
      type: object
      properties:
        moreAvailable:
          type: boolean
          description: Whether there are more bets available.
        pageSize:
          type: integer
          description: Page size used for the response.
          format: int32
          nullable: true
        fromRecord:
          type: integer
          description: Starting record number.
          format: int32
          nullable: true
        toRecord:
          type: integer
          description: Ending record number.
          format: int32
          nullable: true
        totalWinLoss:
          type: number
          description: Total win/loss amount across all returned bets.
          format: double
          nullable: true
        totalStake:
          type: number
          description: Total stake amount across all returned bets.
          format: double
          nullable: true
        straightBets:
          type: array
          items:
            $ref: '#/components/schemas/StraightBet'
          description: A collection of placed straight bets.
          nullable: true
        parlayBets:
          type: array
          items:
            $ref: '#/components/schemas/ParlayBet'
          description: A collection of placed parlay bets.
          nullable: true
        teaserBets:
          type: array
          items:
            $ref: '#/components/schemas/TeaserBet'
          description: A collection of placed teaser bets.
          nullable: true
        specialBets:
          type: array
          items:
            $ref: '#/components/schemas/ContestBet'
          description: A collection of placed special bets.
          nullable: true
        manualBets:
          type: array
          items:
            $ref: '#/components/schemas/ManualBet'
          description: A collection of placed manual bets.
          nullable: true
      additionalProperties: false
      description: Response for the B2B get bets endpoint.
    B2BGetBetsStreamResponse:
      type: object
      properties:
        last:
          type: integer
          description: Last update sequence number used for pagination.
          format: int64
          nullable: true
        bets:
          type: array
          items:
            $ref: '#/components/schemas/IBet'
          description: A collection of bets (all types).
          nullable: true
      additionalProperties: false
      description: Response for the B2B get bets stream endpoint.
    B2BGetBettingStatusResponse:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/B2BGetBettingStatusResponseStatus'
      additionalProperties: false
      description: Response for the B2B get betting status operation.
    B2BGetBettingStatusResponseStatus:
      enum:
        - ALL_BETTING_ENABLED
        - ALL_LIVE_BETTING_CLOSED
        - ALL_BETTING_CLOSED
      type: string
      description: "Betting availability status returned by the B2B get betting status endpoint.  \nALL_BETTING_ENABLED = All betting is enabled,  \nALL_LIVE_BETTING_CLOSED = Live betting is not allowed at this moment,  \nALL_BETTING_CLOSED = All betting is closed"
    B2BPartnerExtensionLegRequest:
      type: object
      properties:
        fatteningVig:
          type: number
          format: double
          nullable: true
      additionalProperties: false
    B2BPartnerExtensionRequest:
      type: object
      properties:
        appId:
          type: string
          nullable: true
        appDetails:
          type: string
          nullable: true
        channel:
          type: string
          nullable: true
        pcTag:
          type: integer
          format: int64
          nullable: true
        percentBook:
          type: integer
          format: int32
        ignorePercentBookForLimits:
          type: boolean
          nullable: true
        portalCommissionAmount:
          type: number
          format: double
          nullable: true
        playerCommissionAmount:
          type: number
          format: double
          nullable: true
        fatteningVig:
          type: number
          format: double
          nullable: true
        playerMaxRiskLimit:
          type: number
          format: double
          nullable: true
        playerAvailableBalance:
          type: number
          format: double
          nullable: true
        playerIsCredit:
          type: boolean
          nullable: true
        playerRequiredPTPct:
          type: integer
          format: int32
          nullable: true
        playerReduceLimitsToPct:
          type: integer
          format: int32
          nullable: true
        externalPTTakenPct:
          type: number
          format: double
          nullable: true
        externalChannel:
          type: string
          nullable: true
        externalSidePTTakenPct:
          type: number
          format: double
          nullable: true
        externalSidePTIndicator:
          type: string
          nullable: true
        externalBettorClass:
          type: string
          nullable: true
        externalBettorRating:
          type: number
          format: double
          nullable: true
        externalGroupingA:
          type: string
          nullable: true
        externalGroupingB:
          type: string
          nullable: true
        externalGroupingC:
          type: string
          nullable: true
        externalGroupingD:
          type: string
          nullable: true
        externalGroupingE:
          type: string
          nullable: true
        externalGroupingF:
          type: string
          nullable: true
        externalGroupingG:
          type: string
          nullable: true
        bettorId:
          type: string
          nullable: true
        groupingA:
          type: string
          nullable: true
        groupingB:
          type: string
          nullable: true
        groupingC:
          type: string
          nullable: true
        groupingD:
          type: string
          nullable: true
        playerLimitMultiplier:
          type: number
          format: double
          nullable: true
        playerCountryCode:
          type: string
          nullable: true
        playerLicenseId:
          type: integer
          format: int32
          nullable: true
        playerAgentId:
          type: string
          nullable: true
        playerCurrencyCode:
          type: string
          nullable: true
        playerCurrencyRateToUSD:
          type: number
          format: double
          nullable: true
        groupingE:
          type: string
          nullable: true
        groupingF:
          type: string
          nullable: true
        groupingG:
          type: string
          nullable: true
      additionalProperties: false
    B2BPlaceDirectBetRequest:
      type: object
      properties:
        uniqueRequestId:
          type: string
          format: uuid
        risk:
          type: number
          format: double
        win:
          type: number
          format: double
        priceAmerican:
          type: integer
          format: int32
        bettorsOddsFormat:
          $ref: '#/components/schemas/OddsFormat'
        sportId:
          type: integer
          format: int32
        eventId:
          type: integer
          format: int32
        periodNumber:
          type: integer
          format: int32
        betType:
          $ref: '#/components/schemas/StraightBetType'
        team:
          $ref: '#/components/schemas/TeamType'
        side:
          $ref: '#/components/schemas/SideType'
        points:
          type: number
          format: double
          nullable: true
        team1Score:
          type: integer
          format: int32
          nullable: true
        team2Score:
          type: integer
          format: int32
          nullable: true
        sourceId:
          type: string
          nullable: true
        sourceIP:
          type: string
          nullable: true
        externalRef:
          type: string
          nullable: true
        externalRefId:
          type: integer
          format: int64
          nullable: true
        ext:
          $ref: '#/components/schemas/B2BPartnerExtensionRequest'
      additionalProperties: false
    B2BPlaceDirectBetResponse:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/B2BPlaceDirectBetResponseStatus'
        errorCode:
          $ref: '#/components/schemas/B2BPlaceDirectBetResponseErrorCode'
        betId:
          type: integer
          description: System-assigned bet identifier when the bet is accepted.
          format: int64
        externalRef:
          type: string
          description: 'External reference from the request, when provided.'
          nullable: true
        uniqueRequestId:
          type: string
          description: Correlation identifier from the request (`uniqueRequestId`).
          format: uuid
      additionalProperties: false
      description: Response returned after placing a direct bet via the B2B API.
    B2BPlaceDirectBetResponseErrorCode:
      enum:
        - NONE
        - EVENT_GRADED_OR_CANCELLED
        - EVENT_NOT_FOUND
        - DUPLICATED_REQUEST
        - INVALID_REQUEST
        - SYSTEM_ERROR
        - INVALID_CUSTOMER_PROFILE
        - WAGER_RISK_AMOUNT_BELOW_ZERO
        - LIVE_PERIOD_GRADED
        - INVALID_PLAYER_CURRENCY
      type: string
      description: "Detailed error when a direct bet could not be accepted. May be combined as flags.  \nNONE = No error,  \nEVENT_GRADED_OR_CANCELLED = Event has been graded or cancelled,  \nEVENT_NOT_FOUND = Event not found,  \nDUPLICATED_REQUEST = Request with the same uniqueRequestId was already processed,  \nINVALID_REQUEST = Request has invalid parameters,  \nSYSTEM_ERROR = Unexpected error,  \nINVALID_CUSTOMER_PROFILE = System configuration issue,  \nWAGER_RISK_AMOUNT_BELOW_ZERO = Wager risk amount is below zero,  \nLIVE_PERIOD_GRADED = Live period has been graded,  \nINVALID_PLAYER_CURRENCY = Player currency code was provided but not found in the database"
    B2BPlaceDirectBetResponseStatus:
      enum:
        - ACCEPTED
        - PROCESSED_WITH_ERROR
      type: string
      description: "High-level result of the place direct bet operation.  \nACCEPTED = Bet was accepted,  \nPROCESSED_WITH_ERROR = Bet was not accepted. See errorCode for details"
    B2BPlaceDirectSpecialBetRequest:
      type: object
      properties:
        uniqueRequestId:
          type: string
          format: uuid
        risk:
          type: number
          format: double
        win:
          type: number
          format: double
        priceAmerican:
          type: integer
          format: int32
        bettorsOddsFormat:
          $ref: '#/components/schemas/OddsFormat'
        specialId:
          type: integer
          format: int32
        contestantId:
          type: integer
          format: int32
        sourceId:
          type: string
          nullable: true
        sourceIP:
          type: string
          nullable: true
        externalRef:
          type: string
          nullable: true
        externalRefId:
          type: integer
          format: int64
          nullable: true
        ext:
          $ref: '#/components/schemas/B2BPartnerExtensionRequest'
      additionalProperties: false
    B2BPlaceDirectSpecialBetResponse:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/B2BPlaceDirectSpecialBetResponseStatus'
        errorCode:
          $ref: '#/components/schemas/B2BPlaceDirectSpecialBetResponseErrorCode'
        betId:
          type: integer
          description: System-assigned bet identifier when the bet is accepted.
          format: int64
        externalRef:
          type: string
          description: 'External reference from the request, when provided.'
          nullable: true
        uniqueRequestId:
          type: string
          description: Correlation identifier from the request (`uniqueRequestId`).
          format: uuid
      additionalProperties: false
      description: Response returned after placing a direct special (contest) bet via the B2B API.
    B2BPlaceDirectSpecialBetResponseErrorCode:
      enum:
        - CONTEST_GRADED_OR_CANCELLED
        - CONTEST_NOT_FOUND
        - DUPLICATED_REQUEST
        - INVALID_REQUEST
        - SYSTEM_ERROR
        - INVALID_CUSTOMER_PROFILE
        - CONTESTANT_NOT_FOUND
        - WAGER_RISK_AMOUNT_BELOW_ZERO
        - INVALID_PLAYER_CURRENCY
      type: string
      description: "Detailed error when a direct special bet could not be accepted. May be combined as flags.  \nCONTEST_GRADED_OR_CANCELLED = Contest has been graded or cancelled,  \nCONTEST_NOT_FOUND = Contest not found,  \nDUPLICATED_REQUEST = Request with the same uniqueRequestId was already processed,  \nINVALID_REQUEST = Request has invalid parameters,  \nSYSTEM_ERROR = Unexpected error,  \nINVALID_CUSTOMER_PROFILE = System configuration issue,  \nCONTESTANT_NOT_FOUND = Contestant not found,  \nWAGER_RISK_AMOUNT_BELOW_ZERO = Wager risk amount is below zero,  \nINVALID_PLAYER_CURRENCY = Player currency code was provided but not found in the database"
    B2BPlaceDirectSpecialBetResponseStatus:
      enum:
        - ACCEPTED
        - PROCESSED_WITH_ERROR
      type: string
      description: "High-level result of the place direct special bet operation.  \nACCEPTED = Bet was accepted,  \nPROCESSED_WITH_ERROR = Bet was not accepted. See errorCode for details"
    B2BPlaceManualBetRequest:
      type: object
      properties:
        clientId:
          type: string
          nullable: true
        uniqueRequestId:
          type: string
          format: uuid
        risk:
          type: number
          format: double
        win:
          type: number
          format: double
        description:
          type: string
          nullable: true
        userId:
          type: string
          nullable: true
        betId:
          type: integer
          format: int64
          nullable: true
        wagerNumber:
          type: integer
          format: int32
          nullable: true
        externalRef:
          type: string
          nullable: true
        ext:
          $ref: '#/components/schemas/B2BPlaceManualBetRequestPartnerExtension'
      additionalProperties: false
    B2BPlaceManualBetRequestPartnerExtension:
      type: object
      properties:
        sourceId:
          type: string
          nullable: true
        sourceIP:
          type: string
          nullable: true
        percentBook:
          type: integer
          format: int32
        appId:
          type: string
          nullable: true
        portalCommissionAmount:
          type: number
          format: double
        playerCommissionAmount:
          type: number
          format: double
        playerMaxRiskLimit:
          type: number
          format: double
          nullable: true
        playerAvailableBalance:
          type: number
          format: double
          nullable: true
        playerIsCredit:
          type: boolean
        playerRequiredPTPct:
          type: integer
          format: int32
          nullable: true
        playerReduceLimitsToPct:
          type: integer
          format: int32
          nullable: true
        externalPTTakenPct:
          type: integer
          format: int32
          nullable: true
        bettorId:
          type: string
          nullable: true
        groupingA:
          type: string
          nullable: true
        groupingB:
          type: string
          nullable: true
        groupingC:
          type: string
          nullable: true
        groupingD:
          type: string
          nullable: true
      additionalProperties: false
    B2BPlaceManualBetResponse:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/B2BPlaceManualBetResponseStatus'
        errorCode:
          $ref: '#/components/schemas/B2BPlaceManualBetResponseErrorCode'
        betId:
          type: integer
          description: System-assigned bet identifier when the bet is accepted or pending.
          format: int64
          nullable: true
        uniqueRequestId:
          type: string
          description: Correlation identifier from the request (`uniqueRequestId`).
          format: uuid
      additionalProperties: false
      description: Response returned after placing a manual bet via the B2B API.
    B2BPlaceManualBetResponseErrorCode:
      enum:
        - NONE
        - PROVIDED_API_KEY_HAS_WRONG_FORMAT
        - UNAUTHORIZED
        - FORBIDDEN
        - PROCESSED_WITH_ERROR
        - SYSTEM_ERROR
        - INVALID_CUSTOMER
        - INVALID_REQUEST
        - CUSTOMER_INACTIVE
        - DUPLICATED_REQUEST
        - INVALIDPARTNEREXTENSION
      type: string
      description: "Detailed error or status code for a manual place bet response.  \nNONE = No error,  \nPROVIDED_API_KEY_HAS_WRONG_FORMAT = Provided API key has wrong format,  \nUNAUTHORIZED = Unauthorized,  \nFORBIDDEN = Forbidden,  \nPROCESSED_WITH_ERROR = Processed with error,  \nSYSTEM_ERROR = Unexpected error,  \nINVALID_CUSTOMER = Invalid customer,  \nINVALID_REQUEST = Request has invalid parameters,  \nCUSTOMER_INACTIVE = Customer is inactive,  \nDUPLICATED_REQUEST = Request with the same uniqueRequestId was already processed,  \nINVALIDPARTNEREXTENSION = Invalid partner extension"
    B2BPlaceManualBetResponseStatus:
      enum:
        - ACCEPTED
        - PENDING_ACCEPTANCE
        - PROCESSED_WITH_ERROR
      type: string
      description: "High-level result of the place manual bet operation.  \nACCEPTED = Bet was accepted,  \nPENDING_ACCEPTANCE = Bet is pending acceptance,  \nPROCESSED_WITH_ERROR = Bet was not accepted. See errorCode for details"
    B2BPlaceParlayBetErrorCode:
      enum:
        - ABOVE_MAX_BET_AMOUNT
        - ALL_BETTING_CLOSED
        - BELOW_MIN_BET_AMOUNT
        - BLOCKED_BETTING
        - BLOCKED_CLIENT
        - INSUFFICIENT_FUNDS
        - INVALID_COUNTRY
        - INVALID_LEGS
        - INVALID_ODDS_FORMAT
        - INVALID_ROUND_ROBIN_OPTIONS
        - ROUND_ROBIN_DISALLOWED
        - TOO_MANY_LEGS
        - TOO_FEW_LEGS
        - RESPONSIBLE_BETTING_RISK_LIMIT_EXCEEDED
        - RESPONSIBLE_BETTING_LOSS_LIMIT_EXCEEDED
        - INVALID_REQUEST
        - DUPLICATED_REQUEST
        - SYSTEM_ERROR_3
        - INVALID_CUSTOMER_PROFILE
        - INCOMPLETE_CUSTOMER_BETTING_PROFILE
        - SAME_GAME_PERIODS_ARE_DISALLOWED
        - INVALID_PARTNER
        - INVALID_SOURCEIP
        - INVALID_SOURCEID
        - SOURCEID_TOO_LONG
        - PARTNER_PERCENT_BOOK_IS_INVALID
        - PARTNER_SOURCE_IP_IS_INVALID
        - CUSTOMER_TYPE_DOES_NOT_MATCH_PARTNER
        - PARTNER_PROFILE_IS_NOT_FOUND
        - PARTNER_INTEGRATION_STRATEGY_IS_INVALID
        - INVALID_PLAYER_CURRENCY
        - SYSTEM_ERROR
      type: string
